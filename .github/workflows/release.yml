name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: linux-x86_64
            archive_ext: tar.gz
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            suffix: linux-aarch64
            archive_ext: tar.gz
            use_cross: true
          - os: macos-13
            target: x86_64-apple-darwin
            suffix: macos-x86_64
            archive_ext: tar.gz
            use_cross: false
          - os: macos-14
            target: aarch64-apple-darwin
            suffix: macos-aarch64
            archive_ext: tar.gz
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
            archive_ext: zip
            use_cross: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross
      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --target "${{ matrix.target }}" --bin membrain --bin membrain-daemon
          else
            cargo build --release --target "${{ matrix.target }}" --bin membrain --bin membrain-daemon
          fi
      - name: Package unix archive
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          PKG="membrain-${VERSION}-${{ matrix.suffix }}"
          mkdir -p "$PKG"
          cp "target/${{ matrix.target }}/release/membrain" "$PKG/"
          cp "target/${{ matrix.target }}/release/membrain-daemon" "$PKG/"
          cp README.md "$PKG/"
          tar -czf "${PKG}.tar.gz" "$PKG"
          shasum -a 256 "${PKG}.tar.gz" | awk '{print $1}' > "${PKG}.tar.gz.sha256"
      - name: Package windows archive
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}"
          $pkg = "membrain-$version-${{ matrix.suffix }}"
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/membrain.exe" "$pkg/"
          Copy-Item "target/${{ matrix.target }}/release/membrain-daemon.exe" "$pkg/"
          Copy-Item "README.md" "$pkg/"
          Compress-Archive -Path "$pkg/*" -DestinationPath "$pkg.zip" -Force
          $hash = (Get-FileHash "$pkg.zip" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "$pkg.zip.sha256" -Value $hash
      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: membrain-${{ matrix.suffix }}
          path: |
            membrain-${{ github.ref_name }}-${{ matrix.suffix }}.${{ matrix.archive_ext }}
            membrain-${{ github.ref_name }}-${{ matrix.suffix }}.${{ matrix.archive_ext }}.sha256

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f -maxdepth 2 -exec cp {} release/ \;
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
